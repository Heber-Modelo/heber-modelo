name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  tests:
    permissions:
      contents: read

    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '24'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run tests
        run: ./gradlew test

  build:
    permissions:
      contents: write

    runs-on: ubuntu-22.04
    needs: tests
    outputs:
      version: ${{ steps.program-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - id: program-version
        name: Get Version to Output
        run: echo "version=$(awk -F' ' '/version/ {print $3}' build.gradle.kts)" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '24'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml
      - name: Setup UV
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --frozen --no-dev
      - name: Compile documentation
        run: uv run mkdocs build --clean --no-directory-urls --site-dir src/main/resources/static/docs

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Download dependencies
        run: npm ci
      - name: Compile SCSS
        run: npm run compile-scss
      - name: Compile Typescript
        run: npm run compile-ts

      - name: Create jar file
        run: ./gradlew bootJar
      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          path: ./build/libs/heber-modelo.jar
          name: heber-modelo.jar

  create-release:
    permissions:
      contents: write

    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/download-artifact@v8.0.1
        with:
          name: heber-modelo.jar

      - name: Calculate Checksum
        run: sha256sum heber-modelo.jar > SHA256SUM

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            SHA256SUM
            heber-modelo.jar
          make_latest: true

  deploy-docs-github-pages:
    permissions:
      contents: write

    needs: build
    runs-on: ubuntu-22.04

    env:
      REPO_URL: "https://github.com/Heber-Modelo/heber-modelo"
      VERSION: ${{ needs.build.outputs.version }}
      SITE_URL: "https://heber-modelo.github.io/heber-modelo/"

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml
      - name: Setup UV
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Deploy using Mike
        run: |
          git config user.name "mike-deploy [actions]"
          git config user.email mike-deploy.no-reply@heber-modelo.github.io
          git fetch --no-tags --prune --depth=1 origin +refs/heads/gh-pages:refs/remotes/origin/gh-pages
          uv run mike deploy \
            --update-aliases \
            --branch gh-pages \
            --push \
            "${VERSION//\"}" \
            latest
