<head>
  <th:block th:replace="~{fragments/head :: head}"></th:block>
  <link rel="stylesheet" th:href="@{/css/sessao.css}" />
  <title th:text="#{web.page.session-enter.title}"></title>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main>
  <form method="post">

    <h1 th:text="#{web.page.session-enter.title}"></h1>

    <label>
      <span class="campos-texto" th:text="#{web.page.session.label.name}"></span>
      <input type="text" name="username" required />
    </label>

    <label>
      <span class="campos-texto" th:text="#{web.page.session.label.password}"></span>
      <input type="password" name="password" required />
    </label>

    <div id="botoes">
      <button th:text="#{web.page.session.button.cancel}" id="cancelar  "></button>
      <button th:text="#{web.page.session.button.confirm}" id="confirmar"></button>
    </div>
  </form>
</main>

<footer th:replace="~{fragments/licenseFooter :: footer}"></footer>
</body>
</html>
