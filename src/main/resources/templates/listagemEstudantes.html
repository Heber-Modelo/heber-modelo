<!doctype html>
<html lang="pt-br" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <th:block th:replace="~{fragments/head :: head}"></th:block>
    <th:block th:insert="~{fragments/bindings :: script}"></th:block>
    <link rel="stylesheet" th:href="@{/css/listagemEstudantes.css}" />
    <title th:text="#{web.page.students-list.title}"></title>
  </head>
  <body>
    <header>
      <button id="home">
        <a th:href="@{index.html}" title="Home">
          <th:block th:replace="~{fragments/listagemEstudantes/icons/home :: svg}"></th:block>
        </a>
      </button>
      <h1 th:text="${programa}"></h1>
      <div id="opcoes-botoes">
        <button>
          <th:block th:replace="~{fragments/listagemEstudantes/icons/notify :: svg}"></th:block>
        </button>
        <button>
          <a th:href="@{configurarSessao.html}" th:title="#{web.page.session-configuration.title}">
           <th:block th:replace="~{fragments/listagemEstudantes/icons/config :: svg}"></th:block>
          </a>
        </button>
      </div>
    </header>
    <main>
      <h2 th:text="#{web.page.students-list.professors.label}"></h2>
      <hr />
      <div class="user-data">
        <a th:href="@{perfil.html}" th:insert="~{fragments/listagemEstudantes/icons/profile :: svg}"></a>
        <span>PLACEHOLDER</span>
        <a><th:block th:replace="~{fragments/listagemEstudantes/icons/email :: svg}"></th:block></a>
      </div>
      <h2 th:text="#{web.page.students-list.students.label}"></h2>
      <hr />
      <div class="user-data">
        <a th:href="@{perfil.html}" th:insert="~{fragments/listagemEstudantes/icons/profile :: svg}"></a>
        <span>PLACEHOLDER</span>
        <a><th:block th:replace="~{fragments/listagemEstudantes/icons/email :: svg}"></th:block></a>
      </div>
      <div class="user-data">
        <a th:href="@{perfil.html}" th:insert="~{fragments/listagemEstudantes/icons/profile :: svg}"></a>
        <span>PLACEHOLDER</span>
        <a><th:block th:replace="~{fragments/listagemEstudantes/icons/email :: svg}"></th:block></a>
      </div>
      <div class="user-data">
        <a th:href="@{perfil.html}" th:insert="~{fragments/listagemEstudantes/icons/profile :: svg}"></a>
        <span>PLACEHOLDER</span>
        <a><th:block th:replace="~{fragments/listagemEstudantes/icons/email :: svg}"></th:block></a>
      </div>
    </main>
  </body>
</html>
